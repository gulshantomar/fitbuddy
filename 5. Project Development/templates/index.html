{% extends "base.html" %}

{% block title %}FitBuddy | Generate Plan{% endblock %}

{% block content %}
<section class="card card-wide">
    <h2>Generate Your 7-Day Workout Plan</h2>
    <form action="/generate" method="post" class="form-grid" data-loading="true">
        <div>
            <label for="name">Full Name</label>
            <input id="name" type="text" name="name" placeholder="Full Name" minlength="2" maxlength="120" required>
        </div>
        <div>
            <label for="age">Age</label>
            <input id="age" type="number" name="age" placeholder="Age" min="10" max="120" required>
        </div>
        <div>
            <label for="weight">Weight (kg)</label>
            <input id="weight" type="number" step="0.1" name="weight" placeholder="Weight" min="20" max="500" required>
        </div>
        <div>
            <label for="goal">Goal</label>
            <select id="goal" name="goal" required>
                <option value="Muscle Gain">Muscle Gain</option>
                <option value="Weight Loss">Weight Loss</option>
                <option value="General Fitness">General Fitness</option>
            </select>
        </div>
        <div>
            <label for="intensity">Intensity</label>
            <select id="intensity" name="intensity" required>
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
            </select>
        </div>
        <div class="full-width">
            <button type="submit">Generate My Plan</button>
        </div>
    </form>
</section>
{% endblock %}
